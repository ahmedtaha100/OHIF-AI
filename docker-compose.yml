# Reference:
# - https://docs.docker.com/compose/compose-file
# - https://eclipsesource.com/blogs/2018/01/11/authenticating-reverse-proxy-with-keycloak/
services:
  # Exposed server that's handling incoming web requests
  ohif_viewer:
    build:
      # Project root
      context: ./Viewers/
      # Relative to context
      dockerfile: ./platform/app/.recipes/Nginx-Orthanc/dockerfile
    image: webapp:latest
    container_name: ohif_viewer
    volumes:
      # Nginx config
      - ./Viewers/platform/app/.recipes/Nginx-Orthanc/config/nginx.conf:/etc/nginx/nginx.conf
      - ./Viewers/platform/app/.recipes/Nginx-Orthanc/config/.htpasswd:/etc/nginx/.htpasswd
      # Logs
      - ./Viewers/platform/app/.recipes/Nginx-Orthanc/logs/nginx:/var/logs/nginx
    ports:
      - '1025:1025' # SSL
      - '1026:1026' # Web
    depends_on:
      #   - keycloak
      - orthanc
    restart: on-failure

  # LINK: https://hub.docker.com/r/jodogne/orthanc-plugins/
  # TODO: Update to use Postgres
  # https://github.com/mrts/docker-postgresql-multiple-databases
  orthanc:
    image: jodogne/orthanc-plugins
    hostname: orthanc
    container_name: PACS
    volumes:
      # Config
      - ./Viewers/platform/app/.recipes/Nginx-Orthanc/config/orthanc.json:/etc/orthanc/orthanc.json:ro
      # Persist data
      - ./Viewers/platform/app/.recipes/Nginx-Orthanc/volumes/orthanc-db/:/var/lib/orthanc/db/
    restart: unless-stopped
    ports:
      - '4242:4242' # Orthanc REST API
      - '8042:8042' # Orthanc HTTP
  
  monai_server:
    build:
      # Project root
      context: ./
      # Relative to context
      dockerfile: ./monai-label/Dockerfile
    image: monai
    runtime: nvidia
    container_name: monai_server
    volumes:
       # Persist data
      - ./monai-label/predictions:/code/predictions
      # Numpy image cache — skips sitk.GetArrayFromImage on subsequent container starts
      - ./monai-label/img_cache:/code/img_cache
      # Model weights (populated once via scripts/download_weights.sh)
      - ./monai-label/checkpoints:/code/checkpoints
      # Radiology app — seeded from sample-apps/radiology on first container start
      - ./monai-label/apps:/code/apps
      # MONAI Label DICOM cache — survives image rebuilds so downloaded studies are not re-fetched
      - ./monai-label/volumes/root-cache:/root/.cache
    extra_hosts:
      # Lets MONAI reach vLLM / other services bound on the host (e.g. port 8000)
      - "host.docker.internal:host-gateway"
    environment:
      - CUDA_VISIBLE_DEVICES=0,1
      - NVIDIA_VISIBLE_DEVICES=all  # This exposes all GPUs to the container
      - NVIDIA_DRIVER_CAPABILITIES=all
      # Hugging Face (Kimi / Qwen router, hub downloads); set in .env or host env
      - HF_TOKEN=${HF_TOKEN:-}
      # VLM API keys (basic_infer reads these env vars)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # vLLM on host:8000 — override if vLLM is elsewhere (same Docker network service name, etc.)
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
    #  - NVIDIA_DRIVER_CAPABILITIES=compute,utility  # Required driver capabilities for GPU use
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              #device_ids: ['7:1']
              capabilities: [gpu]  # Request GPUs for this service
    shm_size: '10gb' #runtime: nvidia  # Use NVIDIA runtime
    ports:
      - '8002:8002' 
    depends_on:
      - ohif_viewer
      - orthanc
    restart: on-failure
